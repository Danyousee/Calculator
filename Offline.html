<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Risk Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            background: #f4f8ff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .offline-card {
            background: white;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(21, 101, 255, 0.1);
            border: 1px solid rgba(21, 101, 255, 0.08);
        }
        .offline-icon {
            font-size: 64px;
            margin-bottom: 16px;
            display: block;
        }
        .offline-card h1 {
            font-size: 24px;
            color: #1d3557;
            margin-bottom: 8px;
        }
        .offline-card p {
            color: #6b7b93;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .offline-card .retry-btn {
            background: #1565ff;
            color: white;
            border: none;
            padding: 14px 32px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 16px rgba(21, 101, 255, 0.3);
        }
        .offline-card .retry-btn:hover {
            background: #0d4fd0;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(21, 101, 255, 0.4);
        }
        .offline-card .retry-btn:active {
            transform: scale(0.96);
        }
        .offline-card .saved-data {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px solid #f0f4ff;
            font-size: 13px;
            color: #6b7b93;
        }
        .offline-card .saved-data i {
            color: #22a65e;
        }
        body.dark-mode .offline-card {
            background: #1a2a3a;
            border-color: rgba(21, 101, 255, 0.15);
        }
        body.dark-mode .offline-card h1 {
            color: #e0e0e0;
        }
        body.dark-mode .offline-card p {
            color: #a0b0c0;
        }
        body.dark-mode .offline-card .saved-data {
            border-top-color: #2a3a4a;
        }
        @media (max-width: 480px) {
            .offline-card {
                padding: 32px 20px;
            }
            .offline-card h1 {
                font-size: 20px;
            }
            .offline-icon {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <span class="offline-icon">📡</span>
        <h1>You're Offline</h1>
        <p>Don't worry! Your trading data is safely saved locally. Connect to the internet to sync and access all features.</p>
        <button class="retry-btn" onclick="location.reload()">
            <i class="fa-solid fa-rotate"></i> Try Again
        </button>
        <div class="saved-data">
            <i class="fa-solid fa-check-circle"></i> All your trades are saved locally
        </div>
    </div>
    <script>
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark-mode');
        }
        window.addEventListener('online', () => {
            location.reload();
        });
    </script>
</body>
</html>
